    <style>
      /* ─── Reset + PWA base ─── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html {
        width: 100%; height: 100%;
        background-color: #1C2B1E;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body {
        width: 100%; height: 100%;
        margin: 0;
        display: flex;
        justify-content: center;
        background-color: #1C2B1E;
      }
      #root {
        width: 100%; height: 100%;
        max-width: 768px;
        position: relative;
        background-color: #FAF6EE;
        overflow-y: auto;
        overflow-x: hidden;
        box-shadow: 0 0 60px rgba(0,0,0,0.3);
      }

      * { -webkit-tap-highlight-color: transparent; }
      html { scroll-behavior: smooth; }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(107,143,113,0.25); border-radius: 2px; }
      ::selection { background: rgba(107,143,113,0.2); color: inherit; }

      /* ══════════════════════════════════════════
         SPLASH SCREEN — Direction artistique pépète.
         Fond deep forest, typographie éditoriale,
         animaux SVG vivants, loader patte animée
         ══════════════════════════════════════════ */
      #splash-screen {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: #1A2E1D;
        z-index: 9999;
        overflow: hidden;
        transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1),
                    transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      }
      #splash-screen.hidden {
        opacity: 0;
        transform: scale(1.03);
        pointer-events: none;
      }

      /* ── Fond texturé ── */
      .sp-bg-circle {
        position: absolute; border-radius: 50%;
        background: radial-gradient(circle, rgba(107,143,113,0.18) 0%, transparent 70%);
        pointer-events: none;
      }
      .sp-bg-1 { width: 500px; height: 500px; top: -160px; right: -160px; }
      .sp-bg-2 { width: 400px; height: 400px; bottom: -120px; left: -120px; }
      .sp-bg-3 { width: 200px; height: 200px; top: 40%; left: 20%; opacity: 0.5; }

      /* ── Centre ── */
      .sp-center {
        position: relative; z-index: 2;
        display: flex; flex-direction: column;
        align-items: center;
        animation: sp-entrance 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }

      /* ── Badge icône ── */
      .sp-badge {
        width: 88px; height: 88px; border-radius: 28px;
        background: rgba(107,143,113,0.18);
        border: 1.5px solid rgba(107,143,113,0.35);
        display: flex; align-items: center; justify-content: center;
        margin-bottom: 20px;
        animation: sp-float 4s ease-in-out infinite;
        box-shadow: 0 0 40px rgba(107,143,113,0.2);
      }

      /* ── Wordmark ── */
      .sp-title {
        font-family: Georgia, 'Times New Roman', serif;
        font-size: 58px; font-weight: 700;
        color: #F5F0E8;
        letter-spacing: -2px;
        line-height: 1;
        margin-bottom: 10px;
      }
      .sp-title-dot { color: #6B8F71; }

      .sp-tagline {
        font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
        font-size: 14px; font-weight: 500;
        color: rgba(245,240,232,0.55);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 44px;
      }

      /* ── Animaux décoratifs ── */
      .sp-animal {
        position: absolute; z-index: 1;
        opacity: 0;
        animation: sp-animal-in 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }
      .sp-a1 { top: 12%; left: 8%;  animation-delay: 0.4s; }
      .sp-a2 { top: 8%;  right: 10%; animation-delay: 0.6s; }
      .sp-a3 { bottom: 18%; left: 6%;  animation-delay: 0.8s; }
      .sp-a4 { bottom: 12%; right: 8%; animation-delay: 1.0s; }
      .sp-a5 { top: 42%; left: 4%;  animation-delay: 0.7s; }
      .sp-a6 { top: 38%; right: 4%; animation-delay: 0.9s; }

      /* flottement continu après l'entrée */
      .sp-a1 { animation: sp-animal-in 0.6s 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards, sp-wobble1 5s 1.2s ease-in-out infinite; }
      .sp-a2 { animation: sp-animal-in 0.6s 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards, sp-wobble2 6s 1.4s ease-in-out infinite; }
      .sp-a3 { animation: sp-animal-in 0.6s 0.8s cubic-bezier(0.34,1.56,0.64,1) forwards, sp-wobble3 4.5s 1.6s ease-in-out infinite; }
      .sp-a4 { animation: sp-animal-in 0.6s 1.0s cubic-bezier(0.34,1.56,0.64,1) forwards, sp-wobble1 5.5s 1.8s ease-in-out infinite; }
      .sp-a5 { animation: sp-animal-in 0.6s 0.7s cubic-bezier(0.34,1.56,0.64,1) forwards, sp-wobble2 7s 1.5s ease-in-out infinite; }
      .sp-a6 { animation: sp-animal-in 0.6s 0.9s cubic-bezier(0.34,1.56,0.64,1) forwards, sp-wobble3 5s 1.7s ease-in-out infinite; }

      /* ── Loader patte ── */
      .sp-loader {
        display: flex; align-items: center; gap: 0;
        position: relative; width: 120px; height: 20px;
      }
      .sp-loader-track {
        width: 100%; height: 2px;
        background: rgba(107,143,113,0.2);
        border-radius: 1px;
        position: relative; overflow: hidden;
      }
      .sp-loader-fill {
        height: 100%;
        background: linear-gradient(90deg, #527A56, #8CB092);
        border-radius: 1px;
        animation: sp-load 2.2s ease-in-out infinite;
      }
      /* Petites pattes au-dessus du loader */
      .sp-paws {
        display: flex; gap: 6px;
        justify-content: center;
        margin-bottom: 12px;
      }
      .sp-paw {
        opacity: 0;
        animation: sp-paw-step 2.2s ease-in-out infinite;
      }
      .sp-paw:nth-child(1) { animation-delay: 0s; }
      .sp-paw:nth-child(2) { animation-delay: 0.28s; }
      .sp-paw:nth-child(3) { animation-delay: 0.56s; }
      .sp-paw:nth-child(4) { animation-delay: 0.84s; }
      .sp-paw:nth-child(5) { animation-delay: 1.12s; }
      .sp-paw:nth-child(6) { animation-delay: 1.4s; }

      /* ── Keyframes ── */
      @keyframes sp-entrance {
        from { opacity: 0; transform: translateY(20px) scale(0.92); }
        to   { opacity: 1; transform: translateY(0)    scale(1);    }
      }
      @keyframes sp-float {
        0%,100% { transform: translateY(0) rotate(-1deg); }
        50%      { transform: translateY(-8px) rotate(1deg); }
      }
      @keyframes sp-animal-in {
        from { opacity: 0; transform: scale(0.4) rotate(-20deg); }
        to   { opacity: 1; transform: scale(1)   rotate(0deg);   }
      }
      @keyframes sp-wobble1 {
        0%,100% { transform: translateY(0) rotate(0deg); }
        30%      { transform: translateY(-12px) rotate(8deg); }
        60%      { transform: translateY(-4px) rotate(-4deg); }
      }
      @keyframes sp-wobble2 {
        0%,100% { transform: translateY(0) rotate(0deg); }
        40%      { transform: translateY(-10px) rotate(-6deg); }
        70%      { transform: translateY(-3px) rotate(3deg); }
      }
      @keyframes sp-wobble3 {
        0%,100% { transform: translateY(0) rotate(0deg) scale(1); }
        50%      { transform: translateY(-14px) rotate(5deg) scale(1.06); }
      }
      @keyframes sp-load {
        0%   { width: 0%;    opacity: 1; }
        80%  { width: 100%;  opacity: 1; }
        100% { width: 100%;  opacity: 0; }
      }
      @keyframes sp-paw-step {
        0%,10%   { opacity: 0; transform: scale(0.5) translateY(3px); }
        20%,50%  { opacity: 1; transform: scale(1) translateY(0); }
        65%,100% { opacity: 0; transform: scale(0.8) translateY(-2px); }
      }
    </style>
  </head>
  <body>
    <!-- ══ SPLASH SCREEN — pépète. branding ══ -->
    <div id="splash-screen">

      <!-- Fonds lumineux -->
      <div class="sp-bg-circle sp-bg-1"></div>
      <div class="sp-bg-circle sp-bg-2"></div>
      <div class="sp-bg-circle sp-bg-3"></div>

      <!-- ── Animal 1 : Chat assis (haut gauche) ── -->
      <div class="sp-animal sp-a1">

          <polygon points="51,18 54,8 46,16" fill="rgba(107,143,113,0.4)" stroke="rgba(107,143,113,0.7)" stroke-width="1" stroke-linejoin="round"/>

          <circle cx="35" cy="28" r="1.2" fill="#1A2E1D"/>
          <circle cx="45" cy="28" r="1.2" fill="#1A2E1D"/>
          <!-- Nez + bouche -->
          <path d="M39 32 L41 32 L40 33.5 Z" fill="rgba(196,149,106,0.8)"/>

          <!-- Moustaches -->

          <line x1="26" y1="33.5" x2="36" y2="33.5" stroke="rgba(245,240,232,0.5)" stroke-width="0.8" stroke-linecap="round"/>
          <line x1="44" y1="32" x2="54" y2="31" stroke="rgba(245,240,232,0.5)" stroke-width="0.8" stroke-linecap="round"/>
          <line x1="44" y1="33.5" x2="54" y2="33.5" stroke="rgba(245,240,232,0.5)" stroke-width="0.8" stroke-linecap="round"/>
          <!-- Queue -->

        </svg>
      </div>

      <!-- ── Animal 2 : Chien qui court (haut droite) ── -->
      <div class="sp-animal sp-a2">
        <svg width="80" height="64" viewBox="0 0 96 72" fill="none" xmlns="http://www.w3.org/2000/svg">

          <ellipse cx="48" cy="38" rx="28" ry="18" fill="rgba(196,149,106,0.22)" stroke="rgba(196,149,106,0.55)" stroke-width="1.5"/>
          <!-- Tête -->
          <circle cx="76" cy="28" r="14" fill="rgba(196,149,106,0.22)" stroke="rgba(196,149,106,0.55)" stroke-width="1.5"/>
          <!-- Oreilles tombantes -->
          <ellipse cx="68" cy="22" rx="5" ry="9" fill="rgba(196,149,106,0.35)" stroke="rgba(196,149,106,0.6)" stroke-width="1" transform="rotate(-20 68 22)"/>
          <ellipse cx="82" cy="20" rx="4" ry="8" fill="rgba(196,149,106,0.35)" stroke="rgba(196,149,106,0.6)" stroke-width="1" transform="rotate(15 82 20)"/>
          <!-- Oeil + nez -->
          <circle cx="80" cy="26" r="2.5" fill="rgba(245,240,232,0.9)"/>
          <circle cx="80" cy="26.5" r="1.2" fill="#1A2E1D"/>
          <ellipse cx="88" cy="31" rx="3.5" ry="2.5" fill="rgba(196,149,106,0.55)"/>

          <ellipse cx="40" cy="14" rx="3" ry="11" fill="rgba(196,149,106,0.2)" stroke="rgba(196,149,106,0.35)" stroke-width="1"/>

        <div class="sp-title">pépète<span class="sp-title-dot">.</span></div>

        <!-- Loader : empreintes de patte qui marchent -->

          <div class="sp-paw">
