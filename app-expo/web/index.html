<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=5, user-scalable=no, viewport-fit=cover" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#7B8B6F" />
    <meta name="description" content="Pépète — Scanner produits, garde animaux, assistant IA. Tout pour le bien-être de vos compagnons." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Pépète" />

    <!-- iOS PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Pépète" />
    <link rel="apple-touch-icon" href="/assets/icon.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="Pépète — Le compagnon de vos compagnons" />
    <meta property="og:description" content="Scanner produits, garde animaux, assistant IA. Tout pour le bien-être de vos animaux." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pepete-front.vercel.app" />
    <meta property="og:site_name" content="Pépète" />
    <meta property="og:image" content="https://pepete-front.vercel.app/assets/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:locale" content="fr_FR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pépète — Le compagnon de vos compagnons" />
    <meta name="twitter:description" content="Scanner produits, garde animaux, assistant IA. Tout pour le bien-être de vos animaux." />
    <meta name="twitter:image" content="https://pepete-front.vercel.app/assets/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/assets/favicon.png" />
    <link rel="manifest" href="/manifest.json" />

    <title>Pépète</title>

    <style>
      /* Reset + PWA base */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html {
        width: 100%; height: 100%;
        background-color: #E8E6E1;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body {
        width: 100%; height: 100%;
        margin: 0;
        display: flex;
        justify-content: center;
        background-color: #E8E6E1;
      }
      #root {
        width: 100%; height: 100%;
        max-width: 768px;
        position: relative;
        background-color: #F8F6F2;
        overflow-y: auto;
        overflow-x: hidden;
        box-shadow: 0 0 30px rgba(0,0,0,0.05);
      }

      /* Remove tap highlight */
      * { -webkit-tap-highlight-color: transparent; }

      /* Smooth scrolling */
      html { scroll-behavior: smooth; }

      /* Safe area: handled by React Native SafeAreaProvider, not CSS */

      /* ─── Premium Splash Screen ─── */
      #splash-screen {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: linear-gradient(155deg, #7B8B6F 0%, #96A88A 50%, #A3B296 100%);
        z-index: 9999;
        transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }
      #splash-screen.hidden { opacity: 0; pointer-events: none; }

      /* Decorative orbs */
      #splash-screen::before {
        content: ''; position: absolute;
        top: -80px; right: -80px;
        width: 280px; height: 280px; border-radius: 50%;
        background: rgba(255,255,255,0.08);
      }
      #splash-screen::after {
        content: ''; position: absolute;
        bottom: -100px; left: -60px;
        width: 320px; height: 320px; border-radius: 50%;
        background: rgba(255,255,255,0.05);
      }

      #splash-screen .splash-logo {
        width: 100px; height: 100px;
        display: flex; align-items: center; justify-content: center;
        margin-bottom: 16px;
        animation: splash-float 3s ease-in-out infinite;
      }

      #splash-screen h1 {
        font-family: Georgia, 'Times New Roman', serif;
        font-size: 36px; font-weight: 700;
        color: #FFF; letter-spacing: 3px;
        margin: 0 0 8px;
        text-transform: lowercase;
      }
      #splash-screen p {
        font-size: 15px; color: rgba(255,255,255,0.8);
        margin: 0; font-weight: 500;
      }

      /* Pulsing dots loader */
      .splash-dots { display: flex; gap: 8px; margin-top: 32px; }
      .splash-dots span {
        width: 8px; height: 8px; border-radius: 4px;
        background: rgba(255,255,255,0.5);
        animation: splash-pulse 1.4s ease-in-out infinite;
      }
      .splash-dots span:nth-child(2) { animation-delay: 0.2s; }
      .splash-dots span:nth-child(3) { animation-delay: 0.4s; }

      @keyframes splash-pulse {
        0%, 80%, 100% { opacity: 0.3; transform: scale(1); }
        40% { opacity: 1; transform: scale(1.3); }
      }
      @keyframes splash-float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-6px); }
      }

      /* Scrollbar styling for web */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.2); }

      /* Selection color */
      ::selection { background: rgba(123, 139, 111, 0.2); color: inherit; }
    </style>
  </head>
  <body>
    <!-- Premium splash while JS loads -->
    <div id="splash-screen">
      <div class="splash-logo">
        <svg width="100" height="100" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M38 108C38 108 36 95 36 80L36 52C36 52 36 40 42 32C48 24 56 20 60 18C60 18 54 14 50 8C48 5 50 2 54 4C58 6 62 10 64 14C68 10 74 6 78 4C82 2 84 5 82 8C78 14 72 18 72 18C80 22 88 30 90 42C92 54 84 68 72 72C64 74 56 72 50 66L50 80C50 95 48 108 48 108Z" fill="white"/>
          <path d="M50 8C50 8 44 18 42 24C42 24 48 16 54 14Z" fill="white"/>
          <path d="M82 8C82 8 88 18 90 24C90 24 78 14 72 14Z" fill="white"/>
          <circle cx="58" cy="38" r="3.5" fill="rgba(255,255,255,0.3)"/>
          <circle cx="58" cy="38" r="1.8" fill="#2C2825"/>
          <path d="M62 45L64 48L60 48Z" fill="#A3B296"/>
          <line x1="54" y1="46" x2="40" y2="43" stroke="rgba(255,255,255,0.4)" stroke-width="1" stroke-linecap="round"/>
          <line x1="54" y1="48" x2="40" y2="50" stroke="rgba(255,255,255,0.4)" stroke-width="1" stroke-linecap="round"/>
          <line x1="68" y1="46" x2="82" y2="43" stroke="rgba(255,255,255,0.4)" stroke-width="1" stroke-linecap="round"/>
          <line x1="68" y1="48" x2="82" y2="50" stroke="rgba(255,255,255,0.4)" stroke-width="1" stroke-linecap="round"/>
          <path d="M92 96C92 92 96 88 100 88C104 88 108 92 108 96C108 100 104 104 100 104C96 104 92 100 92 96Z" fill="rgba(255,255,255,0.7)"/>
          <circle cx="91" cy="86" r="3" fill="rgba(255,255,255,0.7)"/>
          <circle cx="98" cy="82" r="3.2" fill="rgba(255,255,255,0.7)"/>
          <circle cx="106" cy="84" r="3" fill="rgba(255,255,255,0.7)"/>
          <circle cx="111" cy="90" r="2.5" fill="rgba(255,255,255,0.7)"/>
        </svg>
      </div>
      <h1>pépète</h1>
      <p>Le compagnon de vos compagnons</p>
      <div class="splash-dots"><span></span><span></span><span></span></div>
    </div>

    <div id="root"></div>

    <script>
      // Hide splash screen gracefully
      window.addEventListener('load', function() {
        setTimeout(function() {
          var s = document.getElementById('splash-screen');
          if (s) {
            s.classList.add('hidden');
            setTimeout(function() { s.remove(); }, 600);
          }
        }, 600);
      });

      // Register Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/service-worker.js').catch(function() {});
        });
      }
    </script>
  </body>
</html>
