<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=5, user-scalable=no, viewport-fit=cover" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#00E676" />
    <meta name="description" content="Pépète — Scanner produits, garde animaux, assistant IA. Tout pour le bien-être de vos compagnons." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Pépète" />

    <!-- iOS PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Pépète" />
    <link rel="apple-touch-icon" href="/assets/icon.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="Pépète — Le compagnon de vos compagnons" />
    <meta property="og:description" content="Scanner produits, garde animaux, assistant IA. Tout pour le bien-être de vos animaux." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pepete-front.vercel.app" />
    <meta property="og:site_name" content="Pépète" />
    <meta property="og:image" content="https://pepete-front.vercel.app/assets/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:locale" content="fr_FR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pépète — Le compagnon de vos compagnons" />
    <meta name="twitter:description" content="Scanner produits, garde animaux, assistant IA. Tout pour le bien-être de vos animaux." />
    <meta name="twitter:image" content="https://pepete-front.vercel.app/assets/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/assets/favicon.png" />
    <link rel="manifest" href="/manifest.json" />

    <title>Pépète</title>

    <style>
      /* Reset + PWA base */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html {
        width: 100%; height: 100%;
        background-color: #080B12;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body {
        width: 100%; height: 100%;
        margin: 0;
        display: flex;
        justify-content: center;
        background-color: #080B12;
      }
      #root {
        width: 100%; height: 100%;
        max-width: 768px;
        position: relative;
        background-color: #080B12;
        overflow: hidden;
        box-shadow: 0 0 80px rgba(0,230,118,0.06), 0 0 3px rgba(0,230,118,0.08);
      }

      /* Remove tap highlight */
      * { -webkit-tap-highlight-color: transparent; }

      /* Smooth scrolling */
      html { scroll-behavior: smooth; }

      /* Safe area: handled by React Native SafeAreaProvider, not CSS */

      /* ─── Premium Splash Screen ─── */
      #splash-screen {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: #080B12;
        z-index: 9999;
        transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      }
      #splash-screen.hidden { opacity: 0; pointer-events: none; }

      /* Ambient glow */
      #splash-screen::before {
        content: ''; position: absolute;
        top: -100px; left: 50%; transform: translateX(-50%);
        width: 400px; height: 400px; border-radius: 50%;
        background: radial-gradient(circle, rgba(0,230,118,0.18) 0%, transparent 70%);
      }
      #splash-screen::after {
        content: ''; position: absolute;
        bottom: -100px; left: 50%; transform: translateX(-50%);
        width: 300px; height: 300px; border-radius: 50%;
        background: radial-gradient(circle, rgba(167,139,250,0.10) 0%, transparent 70%);
      }

      #splash-screen .splash-logo {
        width: 100px; height: 100px;
        display: flex; align-items: center; justify-content: center;
        margin-bottom: 16px;
        animation: splash-float 3s ease-in-out infinite;
      }

      #splash-screen h1 {
        font-family: Georgia, 'Times New Roman', serif;
        font-size: 36px; font-weight: 700;
        color: #FFF; letter-spacing: 3px;
        margin: 0 0 8px;
        text-transform: lowercase;
      }
      #splash-screen p {
        font-size: 15px; color: rgba(255,255,255,0.8);
        margin: 0; font-weight: 500;
      }

      /* Pulsing dots loader */
      .splash-dots { display: flex; gap: 8px; margin-top: 32px; }
      .splash-dots span {
        width: 6px; height: 6px; border-radius: 3px;
        background: #00E676;
        animation: splash-pulse 1.4s ease-in-out infinite;
      }
      .splash-dots span:nth-child(2) { animation-delay: 0.2s; background: #00BFA5; }
      .splash-dots span:nth-child(3) { animation-delay: 0.4s; background: #A78BFA; }

      #splash-screen h1 {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 38px; font-weight: 900;
        color: #F8FAFC; letter-spacing: -2px;
        margin: 0 0 8px;
      }
      #splash-screen p {
        font-size: 14px; color: rgba(248,250,252,0.45);
        margin: 0; font-weight: 500; letter-spacing: 0.5px;
      }

      #splash-screen .splash-logo {
        width: 88px; height: 88px;
        display: flex; align-items: center; justify-content: center;
        margin-bottom: 20px;
        background: rgba(0,230,118,0.10);
        border-radius: 24px;
        border: 1px solid rgba(0,230,118,0.20);
        animation: splash-float 3s ease-in-out infinite;
      }

      @keyframes splash-pulse {
        0%, 80%, 100% { opacity: 0.3; transform: scale(1); }
        40% { opacity: 1; transform: scale(1.4); }
      }
      @keyframes splash-float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-6px); }
      }

      /* Scrollbar styling for web — dark */
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(0,230,118,0.25); }

      /* Selection */
      ::selection { background: rgba(0,230,118,0.20); color: inherit; }
    </style>
  </head>
  <body>
    <!-- Premium splash while JS loads -->
    <div id="splash-screen">
      <div class="splash-logo">
        <svg width="48" height="48" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M38 108C38 108 36 95 36 80L36 52C36 52 36 40 42 32C48 24 56 20 60 18C60 18 54 14 50 8C48 5 50 2 54 4C58 6 62 10 64 14C68 10 74 6 78 4C82 2 84 5 82 8C78 14 72 18 72 18C80 22 88 30 90 42C92 54 84 68 72 72C64 74 56 72 50 66L50 80C50 95 48 108 48 108Z" fill="#00E676"/>
          <path d="M50 8C50 8 44 18 42 24C42 24 48 16 54 14Z" fill="#00E676"/>
          <path d="M82 8C82 8 88 18 90 24C90 24 78 14 72 14Z" fill="#00E676"/>
          <circle cx="58" cy="38" r="3.5" fill="#F8FAFC" opacity="0.9"/>
          <circle cx="58" cy="38" r="1.8" fill="#080B12"/>
        </svg>
      </div>
      <h1>Pépète</h1>
      <p>Le compagnon de vos compagnons</p>
      <div class="splash-dots"><span></span><span></span><span></span></div>
    </div>

    <div id="root"></div>

    <script>
      // Hide splash screen gracefully
      window.addEventListener('load', function() {
        setTimeout(function() {
          var s = document.getElementById('splash-screen');
          if (s) {
            s.classList.add('hidden');
            setTimeout(function() { s.remove(); }, 600);
          }
        }, 600);
      });

      // Register Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/service-worker.js').catch(function() {});
        });
      }
    </script>
  </body>
</html>
