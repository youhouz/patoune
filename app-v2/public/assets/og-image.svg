<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Green gradient background matching splash screen -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7B8B6F"/>
      <stop offset="50%" stop-color="#96A88A"/>
      <stop offset="100%" stop-color="#A3B296"/>
    </linearGradient>
    <!-- Decorative orbs -->
    <radialGradient id="orb1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="rgba(255,255,255,0.1)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <radialGradient id="orb2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="rgba(255,255,255,0.07)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1100" cy="80" r="200" fill="url(#orb1)"/>
  <circle cx="100" cy="550" r="250" fill="url(#orb2)"/>
  <circle cx="900" cy="500" r="150" fill="url(#orb1)"/>

  <!-- Logo - Pépète cat character (scaled up, centered) -->
  <g transform="translate(480, 80) scale(2.2)">
    <!-- Body -->
    <path d="M38 108C38 108 36 95 36 80L36 52C36 52 36 40 42 32C48 24 56 20 60 18C60 18 54 14 50 8C48 5 50 2 54 4C58 6 62 10 64 14C68 10 74 6 78 4C82 2 84 5 82 8C78 14 72 18 72 18C80 22 88 30 90 42C92 54 84 68 72 72C64 74 56 72 50 66L50 80C50 95 48 108 48 108Z" fill="white"/>
    <!-- Eye -->
    <circle cx="58" cy="38" r="3.5" fill="rgba(255,255,255,0.3)"/>
    <circle cx="58" cy="38" r="1.8" fill="#2C2825"/>
    <!-- Nose -->
    <path d="M62 45L64 48L60 48Z" fill="#A3B296"/>
    <!-- Whiskers -->
    <line x1="54" y1="46" x2="40" y2="43" stroke="rgba(255,255,255,0.4)" stroke-width="1" stroke-linecap="round"/>
    <line x1="54" y1="48" x2="40" y2="50" stroke="rgba(255,255,255,0.4)" stroke-width="1" stroke-linecap="round"/>
    <line x1="68" y1="46" x2="82" y2="43" stroke="rgba(255,255,255,0.4)" stroke-width="1" stroke-linecap="round"/>
    <line x1="68" y1="48" x2="82" y2="50" stroke="rgba(255,255,255,0.4)" stroke-width="1" stroke-linecap="round"/>
    <!-- Paw print -->
    <path d="M92 96C92 92 96 88 100 88C104 88 108 92 108 96C108 100 104 104 100 104C96 104 92 100 92 96Z" fill="rgba(255,255,255,0.7)"/>
    <circle cx="91" cy="86" r="3" fill="rgba(255,255,255,0.7)"/>
    <circle cx="98" cy="82" r="3.2" fill="rgba(255,255,255,0.7)"/>
    <circle cx="106" cy="84" r="3" fill="rgba(255,255,255,0.7)"/>
    <circle cx="111" cy="90" r="2.5" fill="rgba(255,255,255,0.7)"/>
  </g>

  <!-- Brand name -->
  <text x="600" y="420" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700" fill="white" letter-spacing="5">pépète</text>

  <!-- Tagline -->
  <text x="600" y="470" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="rgba(255,255,255,0.85)" font-weight="500">Le compagnon de vos compagnons</text>

  <!-- Feature pills -->
  <g transform="translate(600, 530)" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="rgba(255,255,255,0.7)">
    <rect x="-440" y="-22" width="180" height="38" rx="19" fill="rgba(255,255,255,0.15)"/>
    <text x="-350" y="5">Scanner Produits</text>

    <rect x="-100" y="-22" width="200" height="38" rx="19" fill="rgba(255,255,255,0.15)"/>
    <text x="0" y="5">Garde d'Animaux</text>

    <rect x="250" y="-22" width="180" height="38" rx="19" fill="rgba(255,255,255,0.15)"/>
    <text x="340" y="5">Assistant IA</text>
  </g>
</svg>
